<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Магазин{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar bg-white border-bottom mb-3">
        <div class="container">
            <a class="navbar-brand" href="{% url 'page-home' %}">Магазин</a>
            <div class="navbar-nav flex-row gap-3">
                <a class="nav-link" href="{% url 'page-category-list' %}">Категории</a>
                <a class="nav-link" href="{% url 'page-product-list' %}">Товары</a>
                <a class="nav-link" href="{% url 'page-review-list' %}">Отзывы</a>
            </div>
        </div>
    </nav>
    <main class="container pb-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
